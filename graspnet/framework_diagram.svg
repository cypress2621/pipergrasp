<?xml version="1.5" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <style>
    .title { font-family: Arial; font-size: 18px; font-weight: bold; fill: #333; }
    .layer-title { font-family: Arial; font-size: 14px; font-weight: bold; fill: #333; }
    .module { font-family: Arial; font-size: 12px; fill: #333; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    .box { stroke: #333; stroke-width: 1.5; fill: white; }
    .label { font-family: Arial; font-size: 10px; fill: #666; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#333"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="450" y="35" text-anchor="middle" class="title">系统框架图</text>

  <!-- ========== 硬件层 ========== -->
  <rect x="50" y="70" width="800" height="80" rx="8" fill="#f5f5f5" stroke="#ccc"/>
  <text x="100" y="95" class="layer-title">硬件层</text>

  <rect x="100" y="110" width="140" height="30" class="box"/>
  <text x="170" y="130" text-anchor="middle" class="module">ZED相机</text>

  <rect x="280" y="110" width="140" height="30" class="box"/>
  <text x="350" y="130" text-anchor="middle" class="module">Piper机械臂</text>

  <rect x="460" y="110" width="140" height="30" class="box"/>
  <text x="530" y="130" text-anchor="middle" class="module">标定文件</text>

  <!-- ========== 输入层 ========== -->
  <rect x="50" y="170" width="800" height="70" rx="8" fill="#f5f5f5" stroke="#ccc"/>
  <text x="100" y="195" class="layer-title">输入</text>

  <rect x="100" y="205" width="120" height="25" class="box"/>
  <text x="160" y="222" text-anchor="middle" class="module">RGB图像</text>

  <rect x="250" y="205" width="120" height="25" class="box"/>
  <text x="310" y="222" text-anchor="middle" class="module">深度图</text>

  <rect x="400" y="205" width="120" height="25" class="box"/>
  <text x="460" y="222" text-anchor="middle" class="module">相机内参</text>

  <rect x="550" y="205" width="120" height="25" class="box"/>
  <text x="610" y="222" text-anchor="middle" class="module">标定矩阵</text>

  <!-- ========== 算法层 ========== -->
  <rect x="50" y="260" width="800" height="320" rx="8" fill="#f5f5f5" stroke="#ccc"/>
  <text x="100" y="285" class="layer-title">算法层</text>

  <!-- 感知 -->
  <rect x="100" y="300" width="200" height="50" class="box"/>
  <text x="200" y="320" text-anchor="middle" class="module">YOLO + SAM</text>
  <text x="200" y="338" text-anchor="middle" class="label">目标检测与分割</text>

  <rect x="100" y="370" width="200" height="50" class="box"/>
  <text x="200" y="390" text-anchor="middle" class="module">点云处理</text>
  <text x="200" y="408" text-anchor="middle" class="label">构建 + 过滤 + 采样</text>

  <!-- 融合 -->
  <rect x="350" y="300" width="220" height="50" class="box"/>
  <text x="460" y="320" text-anchor="middle" class="module">输入掩码计算</text>
  <text x="460" y="338" text-anchor="middle" class="label">深度范围 × ROI × 语义掩码</text>

  <!-- 预测 -->
  <rect x="350" y="370" width="220" height="50" class="box"/>
  <text x="460" y="390" text-anchor="middle" class="module">GraspNet</text>
  <text x="460" y="408" text-anchor="middle" class="label">抓取预测 + 碰撞检测 + NMS</text>

  <!-- 变换 -->
  <rect x="350" y="440" width="220" height="50" class="box"/>
  <text x="460" y="460" text-anchor="middle" class="module">手眼标定</text>
  <text x="460" y="478" text-anchor="middle" class="label">相机坐标 → 机器人基坐标</text>

  <!-- 筛选 -->
  <rect x="350" y="510" width="220" height="50" class="box"/>
  <text x="460" y="530" text-anchor="middle" class="module">候选筛选</text>
  <text x="460" y="548" text-anchor="middle" class="label">评分 + 工作空间 + Top-K</text>

  <!-- 输出 -->
  <rect x="620" y="440" width="180" height="50" class="box"/>
  <text x="710" y="460" text-anchor="middle" class="module">抓取位姿</text>
  <text x="710" y="478" text-anchor="middle" class="label">Top-K 候选</text>

  <!-- ========== 执行层 ========== -->
  <rect x="50" y="600" width="800" height="70" rx="8" fill="#f5f5f5" stroke="#ccc"/>
  <text x="100" y="625" class="layer-title">执行层</text>

  <rect x="100" y="635" width="700" height="25" class="box"/>
  <text x="450" y="652" text-anchor="middle" class="module">Piper机械臂：轨迹规划 → 下降到抓取位 → 闭合夹爪 → 提起 → 移动 → 释放 → 返回</text>

  <!-- ========== 箭头 ========== -->
  <!-- 输入到感知 -->
  <line x1="160" y1="230" x2="160" y2="300" class="arrow"/>
  <line x1="310" y1="230" x2="200" y2="300" class="arrow"/>
  <line x1="460" y1="230" x2="460" y2="300" class="arrow"/>
  <line x1="610" y1="230" x2="460" y2="300" class="arrow"/>

  <!-- 感知到融合 -->
  <line x1="300" y1="325" x2="350" y2="325" class="arrow"/>
  <line x1="300" y1="395" x2="350" y2="345" class="arrow"/>

  <!-- 融合到预测 -->
  <line x1="460" y1="350" x2="460" y2="370" class="arrow"/>

  <!-- 预测到变换 -->
  <line x1="460" y1="420" x2="460" y2="440" class="arrow"/>

  <!-- 变换到筛选 -->
  <line x1="460" y1="490" x2="460" y2="510" class="arrow"/>

  <!-- 筛选到输出 -->
  <line x1="570" y1="480" x2="620" y2="465" class="arrow"/>

  <!-- 输出到执行 -->
  <line x1="710" y1="490" x2="710" y2="600" class="arrow"/>

  <!-- 标定文件到算法 -->
  <line x1="530" y1="125" x2="530" y2="205" class="arrow"/>

</svg>