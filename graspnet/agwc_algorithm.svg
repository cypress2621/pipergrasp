<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700">
  <defs>
    <style>
      .title { font-family: Arial; font-size: 20px; font-weight: bold; fill: #333; }
      .subtitle { font-family: Arial; font-size: 14px; fill: #666; }
      .box { fill: #f5f5f5; stroke: #333; stroke-width: 2; rx: 8; }
      .input-box { fill: #e3f2fd; stroke: #1976d2; stroke-width: 2; rx: 8; }
      .process-box { fill: #fff3e0; stroke: #f57c00; stroke-width: 2; rx: 8; }
      .output-box { fill: #e8f5e9; stroke: #388e3c; stroke-width: 2; rx: 8; }
      .formula { font-family: 'Times New Roman'; font-size: 14px; fill: #333; font-style: italic; }
      .label { font-family: Arial; font-size: 12px; fill: #333; }
      .arrow { stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
      .param { font-family: Arial; font-size: 11px; fill: #666; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="450" y="30" text-anchor="middle" class="title">AGWC 算法流程框图</text>
  <text x="450" y="50" text-anchor="middle" class="subtitle">Adaptive Grasp Width Compensation</text>

  <!-- 输入层 -->
  <text x="100" y="95" class="subtitle" font-weight="bold">输入层</text>

  <!-- GraspNet 预测 -->
  <rect x="50" y="110" width="140" height="80" class="input-box"/>
  <text x="120" y="135" text-anchor="middle" class="label">GraspNet</text>
  <text x="120" y="155" text-anchor="middle" class="label">网络输出</text>
  <text x="120" y="175" text-anchor="middle" class="param">w_pred, γ</text>

  <!-- ZED 相机 -->
  <rect x="230" y="110" width="140" height="80" class="input-box"/>
  <text x="300" y="135" text-anchor="middle" class="label">ZED 相机</text>
  <text x="300" y="155" text-anchor="middle" class="label">深度测量</text>
  <text x="300" y="175" text-anchor="middle" class="param">depth</text>

  <!-- 系统参数 -->
  <rect x="410" y="110" width="140" height="80" class="input-box"/>
  <text x="480" y="135" text-anchor="middle" class="label">系统参数</text>
  <text x="480" y="155" text-anchor="middle" class="param">α=0.15</text>
  <text x="480" y="170" text-anchor="middle" class="param">β=0.5</text>
  <text x="480" y="185" text-anchor="middle" class="param">γ₀=0.85</text>

  <!-- 箭头连接线 -->
  <line x1="190" y1="150" x2="230" y2="150" class="arrow"/>
  <line x1="370" y1="150" x2="410" y2="150" class="arrow"/>

  <!-- 深度因子计算模块 -->
  <text x="100" y="230" class="subtitle" font-weight="bold">深度因子模块</text>
  <rect x="50" y="240" width="200" height="100" class="process-box"/>
  <text x="150" y="265" text-anchor="middle" class="label">深度因子计算</text>
  <text x="150" y="295" text-anchor="middle" class="formula">k(d) = 1 - α(1 - e^(-β·d))</text>
  <text x="150" y="325" text-anchor="middle" class="param">α=0.15, β=0.5</text>

  <!-- 置信度因子计算模块 -->
  <text x="400" y="230" class="subtitle" font-weight="bold">置信度因子模块</text>
  <rect x="350" y="240" width="200" height="100" class="process-box"/>
  <text x="450" y="265" text-anchor="middle" class="label">置信度因子计算</text>
  <text x="450" y="295" text-anchor="middle" class="formula">c(γ) = γ₀ + (1-γ₀)·γ</text>
  <text x="450" y="325" text-anchor="middle" class="param">γ₀=0.85</text>

  <!-- 乘法融合模块 -->
  <text x="700" y="230" class="subtitle" font-weight="bold">乘法融合</text>
  <rect x="600" y="240" width="200" height="100" class="output-box"/>
  <text x="700" y="265" text-anchor="middle" class="label">宽度补偿计算</text>
  <text x="700" y="295" text-anchor="middle" class="formula">w = w_pred × k(d) × c(γ)</text>

  <!-- 连接线 -->
  <line x1="300" y1="150" x2="300" y2="240" class="arrow"/>
  <line x1="300" y1="290" x2="450" y2="290" class="arrow"/>
  <line x1="250" y1="290" x2="350" y2="290" class="arrow"/>

  <line x1="550" y1="290" x2="600" y2="290" class="arrow"/>
  <line x1="480" y1="290" x2="520" y2="290" class="arrow"/>

  <!-- 输出层 -->
  <text x="450" y="400" class="subtitle" font-weight="bold">输出层</text>
  <rect x="350" y="410" width="200" height="80" class="output-box"/>
  <text x="450" y="440" text-anchor="middle" class="label">夹爪控制指令</text>
  <text x="450" y="465" text-anchor="middle" class="param">w_eff → Piper 执行</text>

  <line x1="700" y1="340" x2="700" y2="370" class="arrow"/>
  <line x1="700" y1="410" x2="550" y2="450" class="arrow"/>

  <!-- 限制模块 -->
  <rect x="350" y="520" width="200" height="60" class="process-box"/>
  <text x="450" y="550" text-anchor="middle" class="label">宽度限制: w_eff ≥ 0</text>

  <line x1="450" y1="490" x2="450" y2="520" class="arrow"/>

  <!-- Piper 机械臂 -->
  <text x="450" y="610" class="subtitle" font-weight="bold">执行</text>
  <rect x="350" y="620" width="200" height="60" class="input-box"/>
  <text x="450" y="650" text-anchor="middle" class="label">Piper 机械臂</text>
  <text x="450" y="670" text-anchor="middle" class="label">执行抓取动作</text>

  <line x1="450" y1="580" x2="450" y2="620" class="arrow"/>

  <!-- 右侧公式说明 -->
  <rect x="50" y="400" width="250" height="200" fill="#fafafa" stroke="#ccc" rx="5"/>
  <text x="175" y="425" text-anchor="middle" class="subtitle" font-weight="bold">公式说明</text>
  <text x="65" y="455" class="param">• w_pred: GraspNet 预测宽度</text>
  <text x="65" y="475" class="param">• depth: 目标物体深度</text>
  <text x="65" y="495" class="param">• γ: 置信度 [0, 1]</text>
  <text x="65" y="525" class="param">• k(d): 深度补偿因子</text>
  <text x="65" y="545" class="param">  - d→0: k≈1.0 (近距相信)</text>
  <text x="65" y="565" class="param">  - d→∞: k→0.85 (远距保守)</text>
  <text x="65" y="595" class="param">• c(γ): 置信度因子</text>
  <text x="65" y="615" class="param">  - γ=1: c=1.0 (高置信)</text>
  <text x="65" y="635" class="param">  - γ=0: c=0.85 (低置信)</text>

  <!-- 左侧 k(d) 曲线 -->
  <rect x="600" y="520" width="250" height="160" fill="#fafafa" stroke="#ccc" rx="5"/>
  <text x="725" y="545" text-anchor="middle" class="subtitle" font-weight="bold">k(d) 曲线</text>
  <text x="620" y="660" class="param">d (m)</text>
  <text x="605" y="560" class="param">k</text>

  <!-- k(d) 坐标轴 -->
  <line x1="640" y1="570" x2="640" y2="640" stroke="#333" stroke-width="1.5"/>
  <line x1="640" y1="640" x2="820" y2="640" stroke="#333" stroke-width="1.5"/>
  <text x="820" y="645" font-size="10">d</text>
  <text x="635" y="570" font-size="10">k</text>

  <!-- k(d) 曲线点 -->
  <path d="M 640 570 Q 700 575 760 580 T 820 597" fill="none" stroke="#1976d2" stroke-width="2"/>
  <text x="640" y="568" font-size="9" fill="#1976d2">1.0</text>
  <text x="815" y="595" font-size="9" fill="#1976d2">0.85</text>
</svg>
